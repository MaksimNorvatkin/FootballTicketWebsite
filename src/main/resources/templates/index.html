<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Главная - Билеты на матчи АПЛ</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Hero section -->
    <div class="hero-section text-center py-5 mb-4">
        <h1>Добро пожаловать в FootballTicket!</h1>
        <p class="lead">Официальные билеты на матчи Английской Премьер Лиги</p>
        <a href="/matches" class="btn btn-primary btn-lg">Купить билеты</a>
    </div>

    <div class="row">
        <!-- Популярные матчи (левый столбец) -->
        <div class="col-md-6">
            <h2 class="mb-4">⭐ Популярные билеты</h2>
            <div class="matches-list">
                <div class="match-card" th:each="match : ${popularMatches}">
                    <div class="match-date-box">
                        <div class="date-month" th:text="${#temporals.format(match.matchDateTime, 'MMM')}"></div>
                        <div class="date-day" th:text="${#temporals.format(match.matchDateTime, 'dd')}"></div>
                        <div class="date-year" th:text="${#temporals.format(match.matchDateTime, 'yyyy')}"></div>
                    </div>
                    <div class="match-info-box">
                        <div class="match-teams" th:text="${match.homeTeam.name} + ' vs ' + ${match.awayTeam.name}"></div>
                        <div class="match-detail-info">
                            <span>🏟️ <span th:text="${match.stadium.name}"></span></span>
                            <span>🏙️ <span th:text="${match.stadium.city}"></span></span>
                            <span>⏰ <span th:text="${#temporals.format(match.matchDateTime, 'HH:mm')}"></span></span>
                        </div>
                        <a th:href="'/match/' + ${match.id}" class="btn-buy">🎫 Выбрать билеты →</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ближайшие матчи (правый столбец) -->
        <div class="col-md-6">
            <h2 class="mb-4">📅 Ближайшие матчи</h2>
            <div class="matches-list">
                <div class="match-card" th:each="match : ${upcomingMatches}">
                    <div class="match-date-box">
                        <div class="date-month" th:text="${#temporals.format(match.matchDateTime, 'MMM')}"></div>
                        <div class="date-day" th:text="${#temporals.format(match.matchDateTime, 'dd')}"></div>
                        <div class="date-year" th:text="${#temporals.format(match.matchDateTime, 'yyyy')}"></div>
                    </div>
                    <div class="match-info-box">
                        <div class="match-teams" th:text="${match.homeTeam.name} + ' vs ' + ${match.awayTeam.name}"></div>
                        <div class="match-detail-info">
                            <span>🏟️ <span th:text="${match.stadium.name}"></span></span>
                            <span>🏙️ <span th:text="${match.stadium.city}"></span></span>
                            <span>⏰ <span th:text="${#temporals.format(match.matchDateTime, 'HH:mm')}"></span></span>
                        </div>
                        <a th:href="'/match/' + ${match.id}" class="btn-buy">🎫 Выбрать билеты →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
