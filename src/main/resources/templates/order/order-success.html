<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Заказ оформлен</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/order-success.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="success-card">
        <div class="success-icon">🎉</div>
        <h2 class="success-title">Заказ успешно оформлен!</h2>
        <p class="success-message">Спасибо за покупку!</p>
    </div>

    <div class="order-details-card">
        <div class="order-details-header">
            <h5 class="mb-0">Детали заказа</h5>
        </div>
        <div class="order-details-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>📋 Номер заказа:</strong> <span th:text="${orderNumber}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>💰 Сумма:</strong> <span class="badge bg-success fs-6">£<span th:text="${totalAmount}"></span></span></p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <p><strong>📧 Email для отслеживания:</strong> <span th:text="${customerEmail}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>📅 Статус:</strong> <span class="badge bg-success">Оплачен</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <a href="/track-order" class="btn btn-outline-primary">🔍 Отследить заказ</a>
        <a href="/" class="btn btn-primary">🏠 На главную</a>
    </div>
</div>
</body>
</html>
