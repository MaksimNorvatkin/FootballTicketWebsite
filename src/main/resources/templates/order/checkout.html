<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/main}">
<head>
    <title>Оформление заказа</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/checkout.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">📝 Оформление заказа</h2>

    <div class="row">
        <!-- Форма оформления -->
        <div class="col-md-7">
            <div class="checkout-card">
                <div class="checkout-card-header">
                    <h5 class="mb-0">Контактная информация</h5>
                </div>
                <div class="checkout-card-body">
                    <form action="/checkout/submit" method="post">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя *</label>
                            <input type="text" name="customerName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="customerEmail" class="form-control" required>
                            <small class="text-muted">На этот email придёт подтверждение заказа</small>
                        </div>

                        <hr>
                        <h5>Способ оплаты</h5>
                        <div class="alert alert-info">
                            💳 <strong>Демо-режим:</strong> Оплата не требуется. Заказ будет подтверждён автоматически.
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            ✅ Оплатить (Демо)
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Ваш заказ -->
        <div class="col-md-5">
            <div class="order-summary-card">
                <div class="order-summary-header">
                    <h5 class="mb-0">Ваш заказ</h5>
                </div>
                <div class="order-summary-body">
                    <div th:each="entry : ${cartItems}" class="order-item">
                        <div class="d-flex justify-content-between mb-2">
                            <div>
                                <strong th:text="${entry.value.ticket.match.homeTeam.name} + ' vs ' + ${entry.value.ticket.match.awayTeam.name}"></strong>
                                <br>
                                <small class="text-muted">
                                    Сектор <span th:text="${entry.value.ticket.sector.name}"></span>,
                                    Ряд <span th:text="${entry.value.ticket.rowNumber}"></span>,
                                    Место <span th:text="${entry.value.ticket.seatNumber}"></span>
                                </small>
                            </div>
                            <span class="fw-bold">£<span th:text="${entry.value.subtotal}"></span></span>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <strong>Итого:</strong>
                        <strong class="text-success fs-5">£<span th:text="${totalAmount}"></span></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
