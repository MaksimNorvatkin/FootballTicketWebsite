<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Оформление заказа</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">📝 Оформление заказа</h2>

    <div class="row">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Контактная информация</h5>
                </div>
                <div class="card-body">
                    <form action="/checkout/submit" method="post">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя *</label>
                            <input type="text" name="customerName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="customerEmail" class="form-control" required>
                            <small class="text-muted">На этот email придёт подтверждение заказа</small>
                        </div>

                        <hr>
                        <h5>Способ оплаты</h5>
                        <div class="alert alert-info">
                            💳 <strong>Демо-режим:</strong> Оплата не требуется. Заказ будет подтверждён автоматически.
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            ✅ Оплатить (Демо)
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Ваш заказ</h5>
                </div>
                <div class="card-body">
                    <div th:each="entry : ${cartItems}">
                        <div class="d-flex justify-content-between mb-2">
                                <span>
                                    <strong th:text="${entry.value.ticket.match.homeTeam} + ' vs ' + ${entry.value.ticket.match.awayTeam}"></strong><br>
                                    <small>Сектор <span th:text="${entry.value.ticket.sector.name}"></span>,
                                           Ряд <span th:text="${entry.value.ticket.rowNumber}"></span>,
                                           Место <span th:text="${entry.value.ticket.seatNumber}"></span>
                                    </small>
                                </span>
                            <span>£<span th:text="${entry.value.subtotal}"></span></span>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <strong>Итого:</strong>
                        <strong class="text-success">£<span th:text="${totalAmount}"></span></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
