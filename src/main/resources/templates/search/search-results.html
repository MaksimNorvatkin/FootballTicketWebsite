<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Результаты поиска</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">🔍 Результаты поиска:
        <span class="text-primary" th:text="'“' + ${searchQuery} + '”'"></span>
    </h2>
    <!-- Результаты -->
    <div th:if="${matches != null and !matches.empty}">
        <div class="results-count">
            Найдено матчей: <strong th:text="${matchesCount}">0</strong>
        </div>
        <div class="row" id="matchesList">
            <div class="col-md-6 col-lg-4 mb-4" th:each="match : ${matches}">
                <div class="match-card">
                    <div class="match-date-box">
                        <div class="date-month" th:text="${#temporals.format(match.matchDateTime, 'MMM')}"></div>
                        <div class="date-day" th:text="${#temporals.format(match.matchDateTime, 'dd')}"></div>
                        <div class="date-year" th:text="${#temporals.format(match.matchDateTime, 'yyyy')}"></div>
                    </div>
                    <div class="p-3">
                        <div class="match-teams" th:text="${match.homeTeam.name} + ' vs ' + ${match.awayTeam.name}"></div>
                        <div class="match-detail-info">
                            <span>🏟️ <span th:text="${match.stadium.name}"></span></span>
                            <span>🏙️ <span th:text="${match.stadium.city}"></span></span>
                            <span>⏰ <span th:text="${#temporals.format(match.matchDateTime, 'HH:mm')}"></span></span>
                        </div>
                        <a th:href="'/match/' + ${match.id}" class="btn-buy">🎫 Выбрать билеты →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:unless="${matches != null and !matches.empty}" class="alert alert-info">
        <h4>😔 По вашему запросу ничего не найдено</h4>
        <p>Попробуйте поискать по названию команды, города или стадиона.</p>
        <a href="/" class="btn btn-primary">Вернуться на главную</a>
    </div>
</div>
</body>
</html>
