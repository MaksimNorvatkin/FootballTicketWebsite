<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Manager Dashboard</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/manager.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">📋 Панель менеджера</h2>

    <!-- Статистика -->
    <div class="stats-row mb-4">
        <div class="stat-card-wrapper">
            <div class="stat-card">
                <div class="stat-value" id="stat-total" th:text="${totalOrders}">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-success">
                <div class="stat-value" id="stat-paid" th:text="${totalPaid}">0</div>
                <div class="stat-label">Оплачен</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-info">
                <div class="stat-value" id="stat-processing" th:text="${totalProcessing}">0</div>
                <div class="stat-label">В работе</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-primary">
                <div class="stat-value" id="stat-shipped" th:text="${totalShipped}">0</div>
                <div class="stat-label">Отправлен</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-danger">
                <div class="stat-value" id="stat-cancelled" th:text="${totalCancelled}">0</div>
                <div class="stat-label">Отменён</div>
            </div>
        </div>
    </div>

    <!-- Список заказов -->
    <div class="orders-table">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Номер заказа</th>
                <th>Email</th>
                <th>Сумма</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.orderNumber}">ORD-123</td>
                <td th:text="${order.customerEmail}">user@test.com</td>
                <td>£<span th:text="${order.totalAmount}">0</span></td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">-</td>
                <td>
                    <select class="form-select form-select-sm"
                            th:value="${order.status}"
                            th:onchange="'changeStatus(' + ${order.id} + ', this.value)'">
                        <option value="PAID">✅ Оплачен</option>
                        <option value="PROCESSING">🔄 В работе</option>
                        <option value="SHIPPED">📦 Отправлен</option>
                        <option value="CANCELLED">❌ Отменён</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-sm btn-info" th:onclick="'showDetails(' + ${order.id} + ')'">
                        📋 Детали
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/manager.js}"></script>
</th:block>
</body>
</html>
