<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        .cart-btn {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
        }
        .cart-btn:hover {
            background-color: #218838;
            border-color: #1e7e34;
            color: white;
        }
    </style>
</head>
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">⚽ FootballTicket</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/matches">Матчи</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/track-order">Отследить заказ</a>
                </li>
            </ul>

            <!-- Поиск -->
            <form class="d-flex me-3" action="/search" method="get">
                <input class="form-control me-2" type="search" name="query" placeholder="Поиск матчей, команд, стадионов...">
                <button class="btn btn-outline-success" type="submit">Поиск</button>
            </form>

            <!-- Корзина -->
            <a href="/cart" class="btn cart-btn position-relative me-2" id="cartLink">
                🛒 Корзина
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      style="font-size: 0.7rem; display: none;">
                    0
                </span>
            </a>
        </div>
    </div>
</nav>

<script>
    function updateCartCount() {
        fetch('/cart/count')
            .then(response => response.json())
            .then(data => {
                const cartCountSpan = document.getElementById('cartCount');
                if (data && data.count > 0) {
                    cartCountSpan.textContent = data.count;
                    cartCountSpan.style.display = 'inline-block';
                } else {
                    cartCountSpan.style.display = 'none';
                }
            })
            .catch(error => console.error('Error fetching cart count:', error));
    }

    document.addEventListener('DOMContentLoaded', updateCartCount);
</script>
</body>
</html>
