<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="" layout:decorate="~{layout/main}">
<head>
    <title>Управление заказами</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/admin.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📦 Управление заказами</h2>
        <a href="/admin" class="btn btn-outline-secondary">← Назад в админку</a>
    </div>

    <!-- Статистика -->
    <div class="stats-row mb-4">
        <div class="stat-card-wrapper">
            <div class="stat-card">
                <div class="stat-value" id="admin-stat-total" th:text="${totalOrders}">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-success">
                <div class="stat-value" id="admin-stat-paid" th:text="${totalPaid}">0</div>
                <div class="stat-label">Оплачен</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-info">
                <div class="stat-value" id="admin-stat-processing" th:text="${totalProcessing}">0</div>
                <div class="stat-label">В работе</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-primary">
                <div class="stat-value" id="admin-stat-shipped" th:text="${totalShipped}">0</div>
                <div class="stat-label">Отправлен</div>
            </div>
        </div>
        <div class="stat-card-wrapper">
            <div class="stat-card bg-danger">
                <div class="stat-value" id="admin-stat-cancelled" th:text="${totalCancelled}">0</div>
                <div class="stat-label">Отменён</div>
            </div>
        </div>
    </div>

    <!-- Список заказов -->
    <div class="orders-table">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Номер заказа</th>
                <th>Email</th>
                <th>Сумма</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.orderNumber}">ORD-123</td>
                <td th:text="${order.customerEmail}">user@test.com</td>
                <td>£<span th:text="${order.totalAmount}">0</span></td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">-</td>
                <td>
                    <select class="form-select form-select-sm"
                            th:value="${order.status}"
                            th:onchange="'adminChangeStatus(' + ${order.id} + ', this.value)'">
                        <option value="PAID">✅ Оплачен</option>
                        <option value="PROCESSING">🔄 В работе</option>
                        <option value="SHIPPED">📦 Отправлен</option>
                        <option value="CANCELLED">❌ Отменён</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-sm btn-info" th:onclick="'adminShowDetails(' + ${order.id} + ')'">
                        📋 Детали
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <!-- Модальное окно для деталей заказа (админ) -->
    <div class="modal fade" id="adminOrderDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📋 Детали заказа</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="adminOrderDetailsBody">
                    <!-- Содержимое загружается через JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/admin-orders.js}"></script>
</th:block>
</body>
</html>
