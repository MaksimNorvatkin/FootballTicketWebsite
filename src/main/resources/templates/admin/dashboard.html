<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Admin Dashboard</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/admin.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">👑 Админ-панель</h2>

    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="admin-card">
                <div class="admin-card-icon">👥</div>
                <div class="admin-card-title">Пользователи</div>
                <div class="admin-card-value" th:text="${totalUsers}">0</div>
                <a href="/admin/users" class="btn-buy">Управлять →</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="admin-card">
                <div class="admin-card-icon">⚽</div>
                <div class="admin-card-title">Матчи</div>
                <div class="admin-card-value" th:text="${totalMatches}">0</div>
                <a href="/admin/matches" class="btn-buy">Управлять →</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="admin-card">
                <div class="admin-card-icon">🎫</div>
                <div class="admin-card-title">Билеты</div>
                <div class="admin-card-value" th:text="${totalTickets}">0</div>
                <a href="/admin/matches" class="btn-buy">Управлять →</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="admin-card">
                <div class="admin-card-icon">📦</div>
                <div class="admin-card-title">Заказы</div>
                <div class="admin-card-value" th:text="${totalOrders}">0</div>
                <a href="/admin/orders" class="btn-buy">Управлять →</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
