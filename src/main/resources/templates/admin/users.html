<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Управление пользователями</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/admin.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👥 Управление пользователями</h2>
        <a href="/admin" class="btn btn-outline-secondary">← Назад в админку</a>
    </div>

    <div class="users-table">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Имя</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.email}">admin@test.com</td>
                <td th:text="${user.fullName}">Admin</td>
                <td>
                    <select class="form-select form-select-sm" th:onchange="'changeRole(' + ${user.id} + ', this.value)'">
                        <option value="USER" th:selected="${user.role.name() == 'USER'}">👤 USER</option>
                        <option value="MANAGER" th:selected="${user.role.name() == 'MANAGER'}">📋 MANAGER</option>
                        <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">👑 ADMIN</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-sm btn-danger"
                            th:onclick="'deleteUser(' + ${user.id} + ')'"
                            th:unless="${user.email == 'admin@footballticket.ru'}">
                        🗑️ Удалить
                    </button>
                    <span th:if="${user.email == 'admin@footballticket.ru'}" class="text-muted">Главный админ</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/admin-users.js}"></script>
</th:block>
</body>
</html>
