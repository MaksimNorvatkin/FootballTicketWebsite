<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Управление пользователями</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/admin.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👥 Управление пользователями</h2>
        <a href="/admin" class="btn btn-outline-secondary">← Назад в админку</a>
    </div>

    <div class="admin-table">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Имя</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.email}">admin@test.com</td>
                <td th:text="${user.fullName}">Admin</td>
                <td th:text="${user.role}">ADMIN</td>
                <td>
                    <select th:value="${user.role}" class="form-select form-select-sm d-inline-block w-auto">
                        <option value="USER">USER</option>
                        <option value="MANAGER">MANAGER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <button class="btn btn-sm btn-primary mt-1">Сохранить</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
