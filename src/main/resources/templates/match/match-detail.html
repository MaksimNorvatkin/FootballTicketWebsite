<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${match.homeTeam.name} + ' vs ' + ${match.awayTeam.name} + ' - Билеты'"></title>

    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/match-detail.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <!-- Информация о матче -->
    <div class="match-info-card">
        <div class="row g-0">
            <!-- Картинка стадиона (1/4 ширины, во всю высоту) -->
            <div class="col-md-3 stadium-image-container">
                <img th:src="@{/images/stadium-placeholder.jpg}"
                     alt="Stadium"
                     class="stadium-image"
                     onerror="this.src='https://via.placeholder.com/300x200?text=🏟️+Stadium'">
            </div>

            <!-- Блок информации (центр) -->
            <div class="col-md-6">
                <div class="match-info">
                    <h2 class="match-title" th:text="${match.homeTeam.name} + ' vs ' + ${match.awayTeam.name}"></h2>
                    <div class="match-details">
                        <p><span class="info-icon">🏟️</span> <strong>Стадион:</strong> <span th:text="${match.stadium.name}"></span></p>
                        <p><span class="info-icon">🏙️</span> <strong>Город:</strong> <span th:text="${match.stadium.city}"></span></p>
                        <p><span class="info-icon">📅</span> <strong>Дата:</strong> <span th:text="${#temporals.format(match.matchDateTime, 'dd MMMM yyyy, HH:mm')}"></span></p>
                    </div>
                </div>
            </div>

            <!-- Диапазон цен (1/4 ширины) -->
            <div class="col-md-3">
                <div class="price-range-card" id="price-range">
                    <div class="price-range-title">💰 Диапазон цен</div>
                    <div class="price-range-values">
                        £<span th:text="${minPrice}"></span> - £<span th:text="${maxPrice}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Список билетов -->
        <div class="col-md-7 mb-4">
            <h4 class="mb-3">🎫 Доступные билеты</h4>
            <p class="text-muted">Найдено билетов: <strong id="tickets-count" th:text="${totalTickets}">0</strong></p>
            <div id="tickets-container">
                <div th:if="${tickets != null and !tickets.empty}">
                    <div id="tickets-list" class="tickets-list">
                        <div class="ticket-item" th:each="ticket : ${tickets}"
                             th:data-ticket-id="${ticket.id}"
                             th:data-ticket-price="${ticket.price}">
                            <div class="card ticket-card">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">Сектор: <span th:text="${ticket.sector.name}"></span></h6>
                                            <p class="mb-0 small">Ряд: <span th:text="${ticket.rowNumber}"></span>, Место: <span th:text="${ticket.seatNumber}"></span></p>
                                        </div>
                                        <div class="text-end">
                                            <span class="badge bg-success fs-6 price-badge">£<span th:text="${ticket.price}"></span></span>
                                            <button class="btn btn-sm btn-primary" onclick="addToCart(this)">В корзину</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:unless="${tickets != null and !tickets.empty}" class="alert alert-warning">
                    😔 Нет доступных билетов в выбранном секторе
                </div>
            </div>

            <div id="load-more-container" class="text-center mt-3" th:if="${hasMore}">
                <button id="load-more-btn" class="btn btn-outline-primary" onclick="loadMoreTickets()">
                    Показать еще билеты ↓
                </button>
            </div>
        </div>

        <!-- Схема стадиона (с sticky) -->
        <div class="col-md-5 mb-4">
            <div class="sticky-stadium">
                <h4 class="text-center mb-3"><span th:text="${match.stadium.name}"></span></h4>
                <div class="simple-stadium">
                    <!-- Верхний ряд -->
                    <div class="simple-sectors-row top-row">
                        <div class="simple-sector" th:each="sector, iterStat : ${sectors}"
                             th:if="${iterStat.index == 0 or iterStat.index == 1}"
                             th:data-sector-id="${sector.id}"
                             th:style="'background-color: ' + ${sector.color}"
                             th:text="${sector.name}"
                             onclick="filterBySector(this)">
                        </div>
                    </div>

                    <!-- Средний ряд с полем -->
                    <div class="simple-sectors-row middle-row">
                        <div class="simple-sector" th:each="sector, iterStat : ${sectors}"
                             th:if="${iterStat.index == 2}"
                             th:data-sector-id="${sector.id}"
                             th:style="'background-color: ' + ${sector.color}"
                             th:text="${sector.name}"
                             onclick="filterBySector(this)">
                        </div>
                        <div class="simple-pitch">
                            <img th:src="@{/images/football-pitch.png}"
                                 alt="Football Pitch"
                                 class="simple-pitch-image">
                        </div>
                        <div class="simple-sector" th:each="sector, iterStat : ${sectors}"
                             th:if="${iterStat.index == 3}"
                             th:data-sector-id="${sector.id}"
                             th:style="'background-color: ' + ${sector.color}"
                             th:text="${sector.name}"
                             onclick="filterBySector(this)">
                        </div>
                    </div>

                    <!-- Нижний ряд -->
                    <div class="simple-sectors-row bottom-row">
                        <div class="simple-sector" th:each="sector, iterStat : ${sectors}"
                             th:if="${iterStat.index == 4 or iterStat.index == 5}"
                             th:data-sector-id="${sector.id}"
                             th:style="'background-color: ' + ${sector.color}"
                             th:text="${sector.name}"
                             onclick="filterBySector(this)">
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted">⚽ Нажмите на сектор для фильтрации билетов</small>
                </div>
                <div class="text-center mt-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="resetFilter()">Сбросить фильтр</button>
                </div>
            </div>
        </div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/match-detail.js}"></script>
</th:block>
</body>
</html>
