<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" layout:decorate="~{layout/main}">
<head>
    <title>Результаты поиска</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">🔍 Результаты поиска:
        <span class="text-primary" th:text="'“' + ${searchQuery} + '”'"></span>
    </h2>

    <div th:if="${matches != null and !matches.empty}">
        <p class="lead">Найдено матчей: <strong th:text="${matchesCount}"></strong></p>
        <div class="row">
            <div class="col-md-6 mb-3" th:each="match : ${matches}">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${match.homeTeam} + ' vs ' + ${match.awayTeam}"></h5>
                        <p class="card-text">
                            🏟️ <span th:text="${match.stadium}"></span><br>
                            📅 <span th:text="${#temporals.format(match.matchDateTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </p>
                        <a th:href="'/match/' + ${match.id}" class="btn btn-primary">Выбрать билеты</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:unless="${matches != null and !matches.empty}" class="alert alert-info">
        <h4>😔 По вашему запросу ничего не найдено</h4>
        <p>Попробуйте поискать по названию команды, города или стадиона.</p>
        <a href="/" class="btn btn-primary">Вернуться на главную</a>
    </div>
</div>
</body>
</html>
